<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Daily Flow Operating Loop</title>
  <script>
    (() => {
      const KEY = "df-theme";
      const valid = ["light", "dark", "sepia", "aurora"];
      const params = new URLSearchParams(window.location.search);
      let saved = null;
      try { saved = localStorage.getItem(KEY); } catch (e) {}
      const param = params.get("scoutTheme");
      const theme =
        (valid.includes(saved) && saved) ||
        (valid.includes(param) && param) ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <h1>Continuous operating loop</h1>
        <p class="subtitle">How the Daily Flow employees coordinate throughout the workday. The cockpit stays focused on decisions and work that needs your attention.</p>
      </div>
      <div class="toolbar">
        <a class="btn" href="index.html">Back to cockpit</a>
        <a class="btn" href="activity-log.html">Activity Log</a>
        <a class="btn" href="ledger.html">Impact Ledger</a>
      </div>
    </header>

    <section class="card section">
      <div class="timeline" id="timeline"></div>
    </section>
  </div>

  <script>
    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    })[char]);
    async function loadState() {
      const response = await fetch("/api/state", { cache: "no-store" });
      if (!response.ok) throw new Error(`Unable to load state (${response.status})`);
      return response.json();
    }
    function render(state) {
      const steps = state.operatingLoop || [];
      document.getElementById("timeline").innerHTML = steps.length ? steps.map((step) => `
        <article class="slot">
          <div class="time">${esc(step.time)}</div>
          <div><div class="slot-title">${esc(step.title)}</div><div class="slot-detail">${esc(step.detail)}</div></div>
          <span class="status completed">planned</span>
        </article>
      `).join("") : `<div class="empty">Operating loop unavailable.</div>`;
    }
    loadState().then(render).catch((error) => {
      document.getElementById("timeline").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
    });
  </script>
</body>
</html>
